<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" role="img" aria-labelledby="title desc">
  <title id="title">TrainTimer logo</title>
  <desc id="desc">TrainTimer wordmark with a speedcubing timer icon.</desc>
