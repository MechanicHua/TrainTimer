<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1600"
     height="420"
     viewBox="0 0 1600 420"
     role="img"
     aria-labelledby="title desc">
  <title id="title">TrainTimer U/M Cube T refined horizontal lockup</title>
  <desc id="desc">A compact three-by-three cube-face mark whose shifted U row and M column form a T, paired with the TrainTimer name.</desc>

  <defs>
    <linearGradient id="plate" x1="30" y1="28" x2="350" y2="378" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2D3A44"/>
      <stop offset="1" stop-color="#10171D"/>
    </linearGradient>
    <linearGradient id="inactive" x1="70" y1="160" x2="324" y2="338" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#354651"/>
      <stop offset="1" stop-color="#22303A"/>
    </linearGradient>
    <linearGradient id="active" x1="80" y1="74" x2="318" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5F8F8"/>
      <stop offset="1" stop-color="#BBC7CB"/>
    </linearGradient>
    <linearGradient id="signal" x1="64" y1="84" x2="230" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#81C3FF"/>
      <stop offset="1" stop-color="#3B8FEA"/>
    </linearGradient>
    <filter id="shadow" x="-28%" y="-28%" width="156%" height="170%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#071016" flood-opacity="0.26"/>
    </filter>
    <rect id="tile" width="72" height="72" rx="15"/>
  </defs>

  <g id="cube-mark" transform="translate(24 18)">
    <rect x="10" y="10" width="340" height="340" rx="76" fill="url(#plate)"/>
    <rect x="20" y="20" width="320" height="320" rx="66" fill="none" stroke="#B7C8D0" stroke-opacity="0.12" stroke-width="2"/>

    <g fill="url(#inactive)" stroke="#A8BAC3" stroke-opacity="0.13" stroke-width="2">
      <use href="#tile" x="58" y="146"/>
      <use href="#tile" x="222" y="146"/>
      <use href="#tile" x="58" y="228"/>
      <use href="#tile" x="222" y="228"/>
    </g>

    <g fill="url(#signal)">
      <rect x="60" y="83" width="6" height="40" rx="3"/>
      <rect x="142" y="83" width="6" height="40" rx="3"/>
      <rect x="224" y="83" width="6" height="40" rx="3"/>
      <rect x="160" y="148" width="40" height="6" rx="3"/>
      <rect x="160" y="230" width="40" height="6" rx="3"/>
    </g>

    <g fill="url(#active)" filter="url(#shadow)">
      <use href="#tile" x="140" y="156"/>
      <use href="#tile" x="140" y="238"/>
      <use href="#tile" x="68" y="64"/>
      <use href="#tile" x="150" y="64"/>
      <use href="#tile" x="232" y="64"/>
    </g>
  </g>

  <text x="430" y="263"
        fill="#17232B"
        font-family="Avenir Next, SF Pro Display, Helvetica Neue, sans-serif"
        font-size="150"
        font-weight="650"
        letter-spacing="-5">TrainTimer</text>
</svg>
